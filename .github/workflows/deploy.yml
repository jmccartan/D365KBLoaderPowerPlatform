name: Deploy D365 KB Loader (pac code push)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'D365KBLoader/**'
      - '.github/workflows/deploy.yml'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: D365KBLoader
    env:
      PP_ENV_URL: https://orge8583733.crm.dynamics.com/
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install npm deps
        run: npm install --no-audit --no-fund

      - name: Build (vite)
        run: npm run build

      - name: Install Power Platform CLI
        uses: microsoft/powerplatform-actions/actions-install@v1

      - name: pac code push (official action)
        uses: microsoft/powerplatform-actions/code-push@v1
        with:
          environment-url: ${{ env.PP_ENV_URL }}
          app-id: a766001e-69a5-4f9d-9e26-ff63a5f85c66
          tenant-id: ${{ secrets.PP_TENANT_ID }}
          app-id-auth: ${{ secrets.PP_CLIENT_ID }}
          client-secret: ${{ secrets.PP_CLIENT_SECRET }}
