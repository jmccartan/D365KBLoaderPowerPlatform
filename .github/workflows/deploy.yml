name: Deploy D365 KB Loader (pac code push)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'D365KBLoader/**'
      - '.github/workflows/deploy.yml'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: D365KBLoader
    env:
      PP_ENV_URL: https://orge8583733.crm.dynamics.com/
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: D365KBLoader/package-lock.json

      - name: Install npm deps
        run: npm ci

      - name: Build (vite)
        run: npm run build

      - name: Install Power Platform CLI
        uses: microsoft/powerplatform-actions/actions-install@v1

      - name: pac auth (service principal)
        run: |
          pac auth create \
            --url "$PP_ENV_URL" \
            --tenant "${{ secrets.PP_TENANT_ID }}" \
            --applicationId "${{ secrets.PP_CLIENT_ID }}" \
            --clientSecret "${{ secrets.PP_CLIENT_SECRET }}"

      - name: pac org who
        run: pac org who

      - name: pac code push
        run: pac code push --environment "$PP_ENV_URL"
