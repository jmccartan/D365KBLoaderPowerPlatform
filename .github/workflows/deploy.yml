name: Deploy D365 KB Loader (power-apps push)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'D365KBLoader/**'
      - '.github/workflows/deploy.yml'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: D365KBLoader
    env:
      PP_ENV_URL: https://orge8583733.crm.dynamics.com/
      ENV_URL: https://orge8583733.crm.dynamics.com/
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: D365KBLoader/package-lock.json

      - name: Install npm deps
        run: npm ci --no-audit --no-fund

      - name: Run unit tests
        run: npm test --silent

      - name: Build (vite)
        run: npm run build

      - name: Install Power Platform CLI (pac)
        uses: microsoft/powerplatform-actions/actions-install@v1.9.2

      - name: Authenticate pac with service principal
        run: |
          pac auth create \
            --environment "$PP_ENV_URL" \
            --applicationId "$PP_CLIENT_ID" \
            --clientSecret "$PP_CLIENT_SECRET" \
            --tenant "$PP_TENANT_ID"
        env:
          PP_CLIENT_ID: ${{ secrets.PP_CLIENT_ID }}
          PP_CLIENT_SECRET: ${{ secrets.PP_CLIENT_SECRET }}
          PP_TENANT_ID: ${{ secrets.PP_TENANT_ID }}

      - name: Verify pac auth (who-am-i)
        run: pac org who

      - name: Push Code App
        run: npx --no-install power-apps push --non-interactive
